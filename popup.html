<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 260px;
      padding: 16px;
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .logo {
      background: linear-gradient(135deg, #818cf8, #38bdf8);
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
    }
    p {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.4;
      margin: 0 0 16px 0;
    }
    .btn {
      display: block;
      width: 100%;
      background-color: #6366f1;
      color: white;
      text-align: center;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      box-sizing: border-box;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #4f46e5;
    }
    .footer {
      margin-top: 12px;
      font-size: 10px;
      color: #64748b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </div>
    <h3>Tweet Collector</h3>
  </div>
  <p>Scroll Twitter (X) and click the "Save" button injected next to each tweet's actions to collect metrics instantly.</p>
  <a href="http://localhost:3000" target="_blank" class="btn" id="open-dashboard">Open Dashboard</a>
  <div class="footer">v1.1 • Antigravity AI</div>

  <script src="popup.js"></script>
</body>
</html>
